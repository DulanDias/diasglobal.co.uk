<!-- Breadcrumb Navigation Component -->
<nav class="breadcrumb-nav" aria-label="Breadcrumb">
    <div class="container">
        <ol class="breadcrumb-list" itemscope itemtype="https://schema.org/BreadcrumbList">
            <li class="breadcrumb-item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <a href="/" itemprop="item">
                    <span itemprop="name">Home</span>
                </a>
                <meta itemprop="position" content="1" />
            </li>
            <!-- Additional breadcrumb items will be dynamically added based on page -->
        </ol>
    </div>
</nav>

<style>
.breadcrumb-nav {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 0.75rem 0;
    margin-bottom: 2rem;
}

.breadcrumb-list {
    display: flex;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 0.875rem;
    color: var(--text-secondary);
}

.breadcrumb-item {
    display: flex;
    align-items: center;
}

.breadcrumb-item:not(:last-child)::after {
    content: '/';
    margin: 0 0.5rem;
    color: var(--text-muted);
}

.breadcrumb-item a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s ease;
}

.breadcrumb-item a:hover {
    color: var(--primary-color);
}

.breadcrumb-item:last-child {
    color: var(--text-primary);
    font-weight: 500;
}

/* Dark theme adjustments */
[data-theme="dark"] .breadcrumb-nav {
    background: var(--bg-secondary);
    border-bottom-color: var(--border-color);
}

[data-theme="dark"] .breadcrumb-item a {
    color: var(--text-secondary);
}

[data-theme="dark"] .breadcrumb-item a:hover {
    color: var(--primary-color);
}
</style>

<script>
// Breadcrumb component functionality
class BreadcrumbNav {
    constructor() {
        this.breadcrumbList = document.querySelector('.breadcrumb-list');
        this.init();
    }

    init() {
        const path = window.location.pathname;
        const segments = path.split('/').filter(segment => segment);
        
        // Add breadcrumb items based on current path
        segments.forEach((segment, index) => {
            const position = index + 2; // +2 because Home is position 1
            const url = '/' + segments.slice(0, index + 1).join('/');
            const name = this.formatSegmentName(segment);
            
            const listItem = document.createElement('li');
            listItem.className = 'breadcrumb-item';
            listItem.setAttribute('itemprop', 'itemListElement');
            listItem.setAttribute('itemscope', '');
            listItem.setAttribute('itemtype', 'https://schema.org/ListItem');
            
            if (index === segments.length - 1) {
                // Last item (current page)
                listItem.innerHTML = `
                    <span itemprop="name">${name}</span>
                    <meta itemprop="position" content="${position}" />
                `;
            } else {
                // Navigation item
                listItem.innerHTML = `
                    <a href="${url}" itemprop="item">
                        <span itemprop="name">${name}</span>
                    </a>
                    <meta itemprop="position" content="${position}" />
                `;
            }
            
            this.breadcrumbList.appendChild(listItem);
        });
    }

    formatSegmentName(segment) {
        // Convert URL segments to readable names
        const nameMap = {
            'blog': 'Blog',
            'privacy-policy': 'Privacy Policy',
            'terms-of-use': 'Terms of Use',
            'ai-investment-trends-2024': 'AI Investment Trends 2025',
            'real-estate-investment-strategy-2025': 'Real Estate Investment Strategy',
            'real-estate-innovation-disruption': 'Real Estate Innovation',
            'building-entrepreneurial-ecosystem': 'Building Entrepreneurial Ecosystems'
        };
        
        return nameMap[segment] || segment.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }
}

// Initialize breadcrumb when DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
    if (document.querySelector('.breadcrumb-nav')) {
        new BreadcrumbNav();
    }
});
</script>
